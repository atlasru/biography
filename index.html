<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas | Terminal</title>

<style>
    :root {
        --bg: #050508;
        --cmd-green: #00ff41;
        --cmd-blue: #0087ff;
        --text-dim: rgba(0, 255, 65, 0.6);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background-color: var(--bg);
        color: var(--cmd-green);
        font-family: 'Courier New', Courier, monospace;
        padding: 20px;
        height: 100vh;
        overflow: hidden; 
        display: flex;
        flex-direction: column;
    }

    
    body::before {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
        z-index: 2;
        background-size: 100% 2px, 3px 100%;
        pointer-events: none;
    }

    #terminal {
        flex: 1;
        overflow-y: auto;
        padding-bottom: 20px;
        scrollbar-width: none; 
    }

    #terminal::-webkit-scrollbar { display: none; }

    .line { margin-bottom: 5px; min-height: 1.2em; white-space: pre-wrap; }
    .command-output { color: #ffffff; margin-bottom: 10px; }
    .error { color: #ff5555; }
    .system { color: var(--cmd-blue); }

    .input-area {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--bg);
        position: relative;
        z-index: 3;
    }

    .prompt { color: var(--cmd-blue); font-weight: bold; }

    #user-input {
        background: transparent;
        border: none;
        color: var(--cmd-green);
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        width: 100%;
    }

    .enter-overlay {
        position: fixed;
        inset: 0;
        background: black;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .enter-overlay.hidden { display: none; }

    .boot-btn {
        background: transparent;
        border: 1px solid var(--cmd-green);
        color: var(--cmd-green);
        padding: 15px 30px;
        cursor: pointer;
        font-family: inherit;
    }

    .boot-btn:hover { background: var(--cmd-green); color: black; }
</style>
</head>
<body>

<div class="enter-overlay" id="overlay">
    <button class="boot-btn" id="boot">INITIALIZE SYSTEM</button>
</div>

<audio id="music" loop>
    <source src="https://raw.githubusercontent.com/atlasru/biography/main/music.mp3" type="audio/mpeg">
</audio>

<div id="terminal">
    </div>

<div class="input-area">
    <span class="prompt">atlas@osint:~$</span>
    <input type="text" id="user-input" autofocus spellcheck="false">
</div>

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('user-input');
const overlay = document.getElementById('overlay');
const music = document.getElementById('music');

const COMMANDS = {
    help: "Available commands:\n- about: Who is Atlas?\n- projects: Current work & repos\n- contact: Connectivity methods\n- music: Toggle background audio\n- clear: Clear the terminal\n- help: Show this menu",
    about: "Atlas\nOSINT Specialist & Security Researcher\nSpecialization: Digital investigations, automated threat intel, and tool development.",
    projects: "Active Projects:\n1. GhostSearch - Intelligence discovery engine\n2. GhostChat - P2P Secure Layer\n3. Kiro - AI Pentest Agent (Closed Beta)",
    contact: "Connectivity:\n- Email: a956943@push.tg\n- Discord: atlasru\n- qTox: 25912FF37A4B8A299BA2C77811EA9D1E94769746A3AB877A10C21E94DE63331D7C3289111BC4",
    clear: "CLEAR"
};

function addLine(text, type = '') {
    const line = document.createElement('div');
    line.className = `line ${type}`;
    line.innerText = text;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
}

function handleCommand(val) {
    const cmd = val.toLowerCase().trim();
    addLine(`atlas@osint:~$ ${val}`, 'user-cmd');

    if (cmd === '') return;

    if (cmd === 'clear') {
        terminal.innerHTML = '';
        return;
    }

    if (cmd === 'music') {
        if (music.paused) {
            music.play();
            addLine("Audio stream initialized.", "system");
        } else {
            music.pause();
            addLine("Audio stream terminated.", "system");
        }
        return;
    }

    if (COMMANDS[cmd]) {
        addLine(COMMANDS[cmd], 'command-output');
    } else {
        addLine(`Command not found: ${cmd}. Type 'help' for available commands.`, 'error');
    }
}

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        handleCommand(input.value);
        input.value = '';
    }
});


document.getElementById('boot').onclick = () => {
    overlay.classList.add('hidden');
    music.volume = 0.2;
    music.play().catch(() => {});
    
    addLine("ATLAS OS v2.6.0 [Initializing...]", "system");
    setTimeout(() => addLine("Loading security modules...", "system"), 400);
    setTimeout(() => addLine("Connecting to node 127.0.0.1...", "system"), 800);
    setTimeout(() => {
        addLine("\nWelcome, Atlas. System is ready.", "system");
        addLine("Type 'help' to begin.\n", "system");
    }, 1200);
};


document.addEventListener('click', () => input.focus());
</script>

</body>
</html>
